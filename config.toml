# =====================================================================
# config.toml — AquaBeacon シミュレーションのパラメータ一括管理
# =====================================================================
# ここを編集すると、全スクリプト (run_minimum / run_mapping /
# run_sensitivity / run_visualize) と全テストの既定値に反映されます。
#
# - 値の意味・単位はコメント参照。角度は [deg] で書く (内部で rad に変換)。
# - 行ごと消す / セクションごと消すと、src/config.py のデフォルトが使われます。
# - 配列は [x, y, z] のように書く。真偽値は true / false。
# - 編集後はそのまま `python scripts/run_*.py` を実行すれば反映されます。
# ---------------------------------------------------------------------

[coords]                              # 座標系 (MATH_SPEC §0)
p_parent = [0.0, 0.0, 0.0]            # 親機位置 [m] (原点固定)
observe_from_parent = true            # true: 親機→子機 / false: 子機→親機

[noise]                               # 観測ノイズ (MATH_SPEC §7)
sigma_dist   = 0.03                   # 距離精度 [m]
sigma_az_deg = 0.3                    # 方位角精度 [deg]
sigma_el_deg = 0.3                    # 仰角精度 [deg]
sigma_imu    = 0.02                   # IMU 変位ノイズ [m/軸] (Stage2 §5)

[rates]                               # 更新周期 (参考)
acoustic_hz = 5.0                     # 音響測距
optical_hz  = 30.0                    # 光学追跡

# ---------------------------------------------------------------------
# 現実的センサ誤差モデル (MATH_SPEC §8)
#   既定値はすべて「理想」= 従来の零平均ガウスと完全一致するように選んである。
#   enable=false の間は何も変わらない。実機に近い検証をするとき true にして各項を設定。
# ---------------------------------------------------------------------
[error_model]
enable             = false            # true で下記の現実的誤差を有効化
bias_dist          = 0.0              # 距離の系統バイアス [m] (取付・校正誤差)
bias_az_deg        = 0.0              # 方位角の系統バイアス [deg]
bias_el_deg        = 0.0              # 仰角の系統バイアス [deg]
range_growth_per_m = 0.0              # 角度ノイズの距離依存 σ_ang(d)=σ_ang0*(1+k*d)
dist_growth_per_m  = 0.0              # 距離ノイズの距離依存 σ_d(d)=σ_d0*(1+k*d)
outlier_rate       = 0.0              # 1観測成分あたり外れ値が出る確率 (0〜1)
outlier_scale      = 20.0             # 外れ値の大きさ (有効σの倍率)

[acoustic]                            # 音響測距の音速 (MATH_SPEC §8.4)
sound_speed_true    = 1500.0          # 真の水中音速 [m/s] (水温・塩分・水深で変化)
sound_speed_assumed = 1500.0          # 推定側が仮定する音速 [m/s]
                                      #   true と assumed のズレ = 距離の系統スケール誤差

[sync]                                # 光学/音響の時刻同期 (MATH_SPEC §8.5)
acoustic_latency_s = 0.0              # 音響が光学より遅れる時間 [s]
                                      #   この間に子機が動くと距離と角度が別時刻を指す

[depth]                               # 深度センサ(圧力) による鉛直拘束 (MATH_SPEC §10)
enable   = false                      # true で測位/軌道推定に深度を融合 (デモは個別制御)
sigma_m  = 0.05                       # 深度ノイズ [m] (圧力センサ精度, 数cm級)
bias_m   = 0.0                        # 深度バイアス [m] (海面気圧・潮位ドリフト等)

[estimator]                           # ロバスト推定 (MATH_SPEC §4.4)
loss    = "linear"                    # "linear"(純L2,既定) / "huber" / "cauchy" / "soft_l1" / "arctan"
f_scale = 1.345                       # ロバスト損失の内れ値しきい値 [σ単位] (Huber標準=1.345)
                                      #   外れ値(§8.3)に強くするには "huber" や "cauchy" を選ぶ。
                                      #   冗長性のある軌道推定(IMU拘束)で効く。

# ---------------------------------------------------------------------
# 親機の光学リンク: 水中の減衰・拡散モデル (MATH_SPEC §9)
#   光は水中で減衰(吸収+散乱)し、遠い/濁るほど SNR が落ちて角度精度が悪化、
#   さらに検出を見失う(ドロップアウト=外れ値)。深い水深ほど効く。
#   既定 enable=false では何も変わらない。
# ---------------------------------------------------------------------
[optical]
enable          = false               # true で角度観測に減衰モデルを適用
attenuation_c   = 0.30                # ビーム減衰係数 c [1/m] (clear 0.05 / coastal 0.3 / turbid 1.0)
range_ref       = 10.0                # 基準距離 [m] (σ_ref / snr_ref の基準点)
sigma_ref_deg   = 0.3                 # 基準距離での角度ノイズ [deg] (= 目標精度)
sigma_floor_deg = 0.08                # ベストケース角度ノイズ [deg] (画素・校正限界)
snr_ref         = 40.0                # 基準距離での SNR
snr_exponent    = 1.0                 # SNRの信号依存 (1=後方散乱律速 / 0.5=ショットノイズ律速)
snr_min         = 6.0                 # 検出に必要な最小 SNR (未満でドロップアウト確率↑)
dropout_max     = 0.5                 # SNR→0 での最大ドロップアウト確率
dropout_jump_deg= 30.0                # 見失い時の角度の飛び [deg] (誤検出相当の外れ値)

[deepwater]                           # 深い水深のテストシナリオ (run_deepwater.py)
depths       = [5, 10, 15, 20]        # 子機の水深 [m] (z = -depth)
horiz_offset = [3.0, 2.0]             # 子機の水平オフセット (x, y) [m]
clarities    = [0.05, 0.3, 1.0]       # 比較する濁り c [1/m] (clear / coastal / turbid)
traj_depth   = 13.0                   # 軌道テストの水深 [m]
traj_clarity = 0.5                    # 軌道テストの濁り c [1/m] (~3割が見失いになる領域)
mc_n         = 600                    # 各条件のモンテカルロ試行数

[truth]                               # Stage1 真値
child_position = [6.0, 8.0, -7.5]     # 子機真位置 [m] (d=12.5m)

[cube]                                # Stage2 既知キューブ (MATH_SPEC §6)
side       = 0.5                      # 一辺 L_true [m]
center     = [6.0, 8.0, -7.5]         # 中心 [m]
n_per_edge = 7                        # 表面点の格子分割 (1辺あたり)

[stereo]                              # 子機の2カメラ(ステレオ)ジオメトリ (MATH_SPEC §6.2)
baseline      = 0.10                  # 左右カメラ間のベースライン [m]
sigma_cam_deg = 0.1                   # 1カメラの角度ノイズ [deg]
                                      #   ※接近撮影のマッピング用カメラは画素分解能が高く、
                                      #     親機トラッキング(0.3°)より細かい。実カメラ値で更新。
standoff      = 2.0                   # 対象表面からの観測距離 [m] (子機は接近して撮る)
up_axis       = [0.0, 0.0, 1.0]       # ベースライン方向を決める補助軸 (視線と直交化)

[trajectory]                          # Stage2 ダブル芝刈り軌道 (run_mapping)
area        = [8.0, 6.0]              # 掃引範囲 W,H [m]
depth       = -7.5                    # 深さ [m]
n_legs      = 4                       # レグ本数
pts_per_leg = 12                      # 1レグの点数
origin      = [2.0, 5.0]              # 開始隅 [m]

[demo_trajectory]                     # Stage1 可視化用の簡易芝刈り (scene4)
n_points     = 60
area         = [8.0, 6.0]
depth        = -7.5
n_legs       = 4
origin       = [2.0, -3.0]
depth_ripple = 0.6                    # 3D 表示用の微小深さ変動 [m]

[montecarlo]                          # モンテカルロ
n    = 2000                           # 1条件あたりの試行回数
seed = 0                              # 既定シード (再現性)

[mapping]                             # run_mapping のキューブ計測
looks = 30                            # 多視点平均の再観測回数

[sensitivity]                         # run_sensitivity の振り幅
depth_z    = [-2, -5, -7.5, -10, -15] # 距離掃引: 深さ z [m] (斜め配置)
angle_degs = [0.1, 0.3, 0.5, 1.0]     # 角度ノイズ掃引 [deg]
elev_degs  = [-89, -80, -60, -45, -20]# 仰角掃引 [deg]
nadir_d    = 10.0                     # 仰角掃引の距離 [m]
stereo_standoffs = [1.0, 2.0, 3.0, 5.0, 8.0]   # ステレオ: 距離(standoff)掃引 [m]
stereo_baselines = [0.05, 0.1, 0.2, 0.4]       # ステレオ: ベースライン掃引 [m]

[spec]                                # 設計スペックシート (run_spec.py)
# 「目標精度を満たすための設計要求 (baseline/standoff/σ_cam/距離/角度) 」を逆算する。
pos_rmse_target_mm  = 100.0           # 測位 RMSE 目標 [mm] (これ以下にしたい)
pos_bearing         = [0.6, 0.3, -0.75] # 距離掃引の方向ベクトル (正規化して使う)
pos_range_grid      = [5, 8, 10, 12.5, 15, 18, 22]    # 距離 d 掃引 [m]
pos_nominal_range   = 12.5            # 角度ノイズ掃引時の距離 [m]
pos_sigma_ang_grid  = [0.1, 0.2, 0.3, 0.5, 0.8, 1.2]  # 角度ノイズ掃引 [deg]
geom_dim_target_mm  = 30.0            # マッピング寸法誤差 目標 [mm] (これ以下にしたい)
geom_standoff_grid  = [1.0, 1.5, 2.0, 3.0, 4.0, 6.0]  # standoff 掃引 [m]
geom_baseline_grid  = [0.05, 0.1, 0.15, 0.2, 0.3, 0.4] # ベースライン掃引 [m]
geom_sigma_cam_grid = [0.03, 0.05, 0.1, 0.2, 0.3]     # カメラ角度ノイズ掃引 [deg]
geom_looks_grid     = [1, 3, 5, 10, 15, 20, 30]       # フレーム数掃引
geom_n_per_edge     = 5              # キューブ点群分割 (速度優先)
mc_n                = 800            # 測位モンテカルロ試行数

[visualization]                       # run_visualize のシーン規模
cloud_n         = 1500                # scene1 3D推定クラウドの試行数
cube_n_per_edge = 7                   # scene6/8/10 キューブ点群の分割
looks           = 20                  # scene6 多視点平均の回数
max_looks       = 30                  # scene8/10 最大再観測回数
rotate_frames   = 72                  # 回転アニメのフレーム数
sens_dists      = [3, 6, 9, 12.5, 16] # scene10 距離掃引 [m]
